name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tagging if needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Recreate ignored files
        run: |
          cat << 'EOF' > .env
          ${{ vars.ENV_FILE }}
          EOF

          cat << 'EOF' > emojis_config.json
          ${{ vars.EMOJIS_CONFIG }}
          EOF

          cat << 'EOF' > queue_ranks.json
          ${{ vars.QUEUE_RANKS }}
          EOF

      - name: Verify required files exist
        run: |
          for f in .env emojis_config.json queue_ranks.json; do
            [ -f "$f" ] || { echo "ERROR: Missing $f"; exit 1; }
          done

      - name: Build Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ghcr.io/sparx-now/sparxnow-autocompleter:latest

      - name: Push Docker image
        run: docker push ghcr.io/sparx-now/sparxnow-autocompleter:latest
